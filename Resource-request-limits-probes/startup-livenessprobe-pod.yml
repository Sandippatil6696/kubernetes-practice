apiVersion: v1
kind: Pod
metadata:
  name: startup-liveness-pod
  labels:
    app: startup-liveness-pod-lbl
spec:
  containers:
    - name: busybox
      image: busybox:1.37
      command:
        - sh
        - -c
        - |
          sleep 20;
          touch /tmp/started;
          sleep 300;

      startupProbe:
        exec:
          command:
            - cat
            - /tmp/started
        periodSeconds: 5
        failureThreshold: 12   #  12 × 5 = 60 seconds budget

      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/started
        periodSeconds: 5