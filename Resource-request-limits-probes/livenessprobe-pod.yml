apiVersion: v1
kind: Pod
metadata:
  name: liveness-pod
  labels:
    app: liveness-pod-label

spec:
  containers:
    - name: liveness-pod-cont
      image: busybox
      command:
      - sh
      - -c 
      - |
        touch /tmp/healthy;
        sleep 40;
        rm -rf /tmp/healthy ;
        sleep 300 ;
      livenessProbe:
        exec:
          command:
            - cat
            - /tmp/healthy
        periodSeconds: 5
        failureThreshold: 3