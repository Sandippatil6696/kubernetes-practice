apiVersion: v1
kind: Pod
metadata:
  name: stress-oom-pod
  labels:
    app: stress-oom-pod-lbl
spec:
  containers:
    - name: stress-cont
      image: polinux/stress
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "200M", "--vm-hang", "1"]
      resources:
        requests:
          memory: "50Mi"
        limits:
          memory: "100Mi"  
        