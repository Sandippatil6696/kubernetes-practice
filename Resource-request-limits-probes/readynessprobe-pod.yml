apiVersion: v1
kind: Pod
metadata:
  name: nginx-readiness-pod
  labels:
    app: nginx-pod-lbl
spec:
  containers:
    - name: nginx-readyness-cont
      image: nginx:1.29
      ports:
        - containerPort: 80
      readinessProbe:
        httpGet:
          path: /
          port: 80
        initialDelaySeconds: 5
        periodSeconds: 5