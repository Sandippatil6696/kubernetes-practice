apiVersion: v1
kind: Pod
metadata:
  name: busybox-pod
  labels:
spec:
  containers:
  - name: busybox
    image: busybox:latest
    command: ["/bin/sh", "-c" ]
    args:
      - |
        while true; do
          echo "hii i am sandip" >> /data/message.txt;
          sleep 5;
        done
    volumeMounts:
      - name: busybox-pv
        mountPath: /data/

  volumes:
    - name: busybox-pv
      persistentVolumeClaim:
        claimName: my-pvc