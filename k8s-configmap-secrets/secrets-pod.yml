apiVersion: v1
kind: Pod
metadata:
  name: secret-demo-pod
spec:
  containers:
    - name: busybox-container
      image: busybox
      command: ["/bin/sh", "-c"]
      args:
        - echo "DB_USER=$DB_USER";
          echo "Listing secret files:";
          ls /etc/db-credentials;
          echo "Reading DB_USER file:";
          cat /etc/db-credentials/DB_USER;
          sleep 3600;
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER
      volumeMounts:
        - name: db-secret-volume
          mountPath: /etc/db-credentials
          readOnly: true
  volumes:
    - name: db-secret-volume
      secret:
        secretName: db-credentials
  restartPolicy: Never