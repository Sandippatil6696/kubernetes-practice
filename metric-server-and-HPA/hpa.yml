
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: apache-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: apache-cpu-request-deployment
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60